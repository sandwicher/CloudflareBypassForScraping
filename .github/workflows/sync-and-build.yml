name: Sync upstream & build image

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: '上游无更新时也强制构建'
        type: boolean
        default: false

concurrency:
  group: sync-and-build
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_changes: ${{ steps.sync.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync with upstream
        id: sync
        env:
          UPSTREAM: https://github.com/sarperavci/CloudflareBypassForScraping.git
          BRANCH: main
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream "$UPSTREAM"
          git fetch upstream "$BRANCH"

          BEFORE=$(git rev-parse HEAD)
          git merge --no-edit "upstream/$BRANCH"
          AFTER=$(git rev-parse HEAD)

          if [ "$BEFORE" != "$AFTER" ]; then
            echo "上游有更新：$BEFORE -> $AFTER"
            git push origin "HEAD:$BRANCH"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "上游无更新，跳过构建"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: sync
    if: needs.sync.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
